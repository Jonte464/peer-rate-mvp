<!-- TOP ROW (universal, alltid synlig) -->
<header class="top-row">
  <style>
    /* Gör top row konsekvent på ALLA sidor (vinner över index.css etc) */
    .top-row{
      position: sticky !important;
      top: 0 !important;
      z-index: 1000 !important;
      background: rgba(255,255,255,.78) !important;
      backdrop-filter: blur(12px) !important;
      border-bottom: 1px solid rgba(15,15,18,.10) !important;
    }
    .top-row .shell{
      max-width: 100% !important;
      padding: 0 28px !important;
    }
    @media (max-width: 820px){
      .top-row .shell{ padding: 0 16px !important; }
    }

    .top-row .brand{
      color: rgba(15,15,18,.92) !important;
      text-decoration:none;
      display:flex;
      align-items:center;
      gap:12px;
      user-select:none;
      min-width:220px;
    }
    @media (max-width: 820px){
      .top-row .brand{ min-width: unset; }
    }
    .top-row .brand-sub{
      color: rgba(15,15,18,.64) !important;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:flex-end;
      position: relative;
    }

    /* GUBBEN ska alltid synas + klickbar */
    .top-row .top-user{
      display: inline-flex !important;
      align-items:center !important;
      justify-content:center !important;
      width: 40px !important;
      height: 40px !important;
      border-radius: 999px !important;
      border: 1px solid rgba(11,22,51,.16) !important;
      background: rgba(255,255,255,.78) !important;
      cursor: pointer !important;
      position: relative !important;
      pointer-events: auto !important;
    }
    .top-row .top-user svg path{
      stroke: rgba(11,22,51,.92) !important;
    }
    .top-row .top-user.is-logged-in::after{
      content:"";
      position:absolute;
      width:10px; height:10px;
      border-radius:999px;
      right:-1px; top:-1px;
      background: rgba(34,197,94,1);
      box-shadow: 0 0 0 6px rgba(34,197,94,.12);
      border: 2px solid rgba(255,255,255,.92);
    }

    /* Meny-knappar */
    .lang-pill{
      border: 1px solid rgba(15,15,18,.12) !important;
      background: rgba(255,255,255,.78) !important;
      color: rgba(15,15,18,.92) !important;
      padding: 7px 10px;
      border-radius: 999px;
      font-weight:650;
      font-size:13px;
      cursor:pointer;
    }

    .menu-btn{
      width:40px; height:40px;
      border-radius:999px;
      border: 1px solid rgba(15,15,18,.12) !important;
      background: rgba(255,255,255,.78) !important;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }

    /* Dropdowns */
    .user-menu, .lang-menu{
      position:absolute;
      right:0;
      top: 52px;
      width: 200px;
      background:#fff;
      border: 1px solid rgba(15,15,18,.10);
      border-radius: 14px;
      box-shadow: 0 18px 60px rgba(0,0,0,.12);
      padding: 8px;
      display:none;
      z-index: 1200;
    }
    .lang-menu{ right: 52px; } /* så den hamnar vid språkpill */

    /* Hamburgerpanel: mer luft */
    .menu-panel{
      position: fixed;
      top: 68px;
      right: 16px;
      width: 280px;
      max-height: 80vh;
      overflow-y: auto;
      display:none;
      border: 1px solid rgba(15,15,18,.10);
      border-radius: 18px;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 70px rgba(0,0,0,.16);
      padding: 10px;              /* luft runt */
      z-index: 1100;
    }
    .menu-panel-inner{
      padding: 10px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .menu-link{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.05);
      background: rgba(255,255,255,.78);
      text-decoration:none;
      color: rgba(15,15,18,.92);
      font-weight:720;
    }
  </style>

  <div class="shell top-row-inner" style="display:flex;align-items:center;justify-content:space-between;gap:14px;padding:10px 0;">
    <a class="brand soft-hover" href="/">
      <div class="logo-badge" aria-hidden="true">
        <img class="logo-img" src="/assets/Logo.PNG?v=1" alt="PeerRate logo" />
      </div>
      <div>
        <div class="brand-name" style="font-weight:780;letter-spacing:-0.02em;line-height:1.1;">PeerRate</div>
        <div class="brand-sub" data-i18n="top_sub" style="font-size:12px;margin-top:2px;">Förtroende du kan bevisa</div>
      </div>
    </a>

    <div class="top-actions">
      <!-- GUBBE -->
      <button class="top-user" id="topUserPill" type="button" aria-label="Konto" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0" stroke="rgba(11,22,51,.92)" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="rgba(11,22,51,.92)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- User menu (fylls av topRow.js) -->
      <div class="user-menu" id="userMenu" role="menu" aria-label="Användarmeny"></div>

      <button class="lang-pill soft-hover" id="langBtn" type="button" aria-haspopup="true" aria-expanded="false">
        <span id="langLabel">SV</span>
        <span style="opacity:.6;">▾</span>
      </button>

      <button class="menu-btn soft-hover" id="menuBtn" type="button" aria-label="Öppna meny" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16" stroke="rgba(15,15,18,.85)" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="lang-menu" id="langMenu" role="menu" aria-label="Välj språk">
    <button type="button" data-lang="sv">Svenska (SV)</button>
    <button type="button" data-lang="en">English (EN)</button>
  </div>

  <nav class="menu-panel" id="menuPanel" aria-label="Meny">
    <div class="shell menu-panel-inner">
      <a class="menu-link" href="/"><div>Hem</div><span>→</span></a>
      <a class="menu-link" href="/customer.html"><div>Registrera dig</div><span>→</span></a>
      <a class="menu-link" href="/profile.html"><div>Min profil</div><span>→</span></a>
      <a class="menu-link" href="/rate.html"><div>Lämna betyg</div><span>→</span></a>
      <a class="menu-link" href="/extension.html"><div>Installera extension</div><span>→</span></a>
      <a class="menu-link" href="/references.html"><div>Arbetsreferenser</div><span>→</span></a>
    </div>
  </nav>
</header>
