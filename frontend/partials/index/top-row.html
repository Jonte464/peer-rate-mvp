<!-- TOP ROW (universal, alltid synlig) -->
<header class="top-row">
  <style>
    /* ===== UNIVERSAL TOP ROW (vinner över sid-CSS) ===== */
    .top-row{
      position: sticky !important;
      top: 0 !important;
      z-index: 1000 !important;
      background: rgba(255,255,255,.78) !important;
      backdrop-filter: blur(12px) !important;
      border-bottom: 1px solid rgba(15,15,18,.10) !important;
    }

    .top-row .shell{
      max-width: 100% !important;
      padding: 0 28px !important;
    }
    @media (max-width: 820px){
      .top-row .shell{ padding: 0 16px !important; }
    }

    /* Viktigt: vissa sidor har egen CSS som “klämmer” headern.
       Vi gör layouten helt låst här. */
    .top-row-inner{
      display:flex !important;
      align-items:center !important;
      justify-content:space-between !important;
      gap: 14px !important;
      padding: 10px 0 !important;
      min-height: 60px !important;
    }

    .top-row .brand{
      color: rgba(15,15,18,.92) !important;
      text-decoration:none !important;
      display:flex !important;
      align-items:center !important;
      gap:12px !important;
      user-select:none !important;
      min-width:220px !important;
    }
    @media (max-width: 820px){
      .top-row .brand{ min-width: unset !important; }
    }

    .brand-name{
      font-weight:780 !important;
      letter-spacing:-0.02em !important;
      line-height:1.1 !important;
    }
    .top-row .brand-sub{
      color: rgba(15,15,18,.64) !important;
      font-size:12px !important;
      margin-top:2px !important;
    }
    @media (max-width: 520px){
      .top-row .brand-sub{ display:none !important; }
    }

    .top-actions{
      display:flex !important;
      align-items:center !important;
      gap:10px !important;
      justify-content:flex-end !important;
      position: relative !important;
    }

    /* ===== GUBBEN: enhetlig storlek på ALLA sidor ===== */
    #topUserBtn{
      display: inline-flex !important;
      align-items:center !important;
      justify-content:center !important;
      width: 40px !important;
      height: 40px !important;
      min-width: 40px !important;
      min-height: 40px !important;
      border-radius: 999px !important;
      border: 1px solid rgba(11,22,51,.16) !important;
      background: rgba(255,255,255,.78) !important;
      cursor: pointer !important;
      position: relative !important;
      padding: 0 !important;
      pointer-events: auto !important;
      box-sizing: border-box !important;
    }
    #topUserBtn svg{
      width: 20px !important;
      height: 20px !important;
      display:block !important;
    }
    #topUserBtn svg path{
      stroke: rgba(11,22,51,.92) !important;
    }

    /* Grön dot när inloggad */
    #topUserBtn.is-logged-in::after{
      content:"";
      position:absolute;
      width:10px; height:10px;
      border-radius:999px;
      right:-1px; top:-1px;
      background: rgba(34,197,94,1);
      box-shadow: 0 0 0 6px rgba(34,197,94,.12);
      border: 2px solid rgba(255,255,255,.92);
    }

    .lang-pill{
      border: 1px solid rgba(15,15,18,.12) !important;
      background: rgba(255,255,255,.78) !important;
      color: rgba(15,15,18,.92) !important;
      padding: 7px 10px !important;
      border-radius: 999px !important;
      font-weight:650 !important;
      font-size:13px !important;
      cursor:pointer !important;
      height: 40px !important;   /* gör den lika “hög” som gubbe/hamburgare */
      display:inline-flex !important;
      align-items:center !important;
      gap: 8px !important;
    }

    .menu-btn{
      width:40px !important;
      height:40px !important;
      border-radius:999px !important;
      border: 1px solid rgba(15,15,18,.12) !important;
      background: rgba(255,255,255,.78) !important;
      cursor:pointer !important;
      display:flex !important;
      align-items:center !important;
      justify-content:center !important;
      padding:0 !important;
      box-sizing:border-box !important;
    }

    /* Dropdowns */
    .user-menu, .lang-menu{
      position:absolute !important;
      right:0 !important;
      top: 56px !important;
      width: 200px !important;
      background:#fff !important;
      border: 1px solid rgba(15,15,18,.10) !important;
      border-radius: 14px !important;
      box-shadow: 0 18px 60px rgba(0,0,0,.12) !important;
      padding: 8px !important;
      display:none;
      z-index: 1200 !important;
    }
    .lang-menu{ right: 52px !important; }

    .user-menu button, .lang-menu button{
      width:100%;
      text-align:left;
      border: 0;
      background: transparent;
      padding: 10px 10px;
      border-radius: 10px;
      cursor:pointer;
      font-weight: 750;
    }
    .user-menu button:hover, .lang-menu button:hover{ background: rgba(15,15,18,.05); }

    /* Hamburgerpanel: mer luft */
    .menu-panel{
      position: fixed !important;
      top: 72px !important;
      right: 16px !important;
      width: 280px !important;
      max-height: 80vh !important;
      overflow-y: auto !important;
      display:none;
      border: 1px solid rgba(15,15,18,.10) !important;
      border-radius: 18px !important;
      background: rgba(255,255,255,.96) !important;
      backdrop-filter: blur(12px) !important;
      box-shadow: 0 24px 70px rgba(0,0,0,.16) !important;
      padding: 10px !important;
      z-index: 1100 !important;
    }
    .menu-panel-inner{
      padding: 10px !important;
      display:flex !important;
      flex-direction:column !important;
      gap: 10px !important;
    }
    .menu-link{
      display:flex !important;
      justify-content:space-between !important;
      align-items:center !important;
      padding: 12px 12px !important;
      border-radius: 14px !important;
      border: 1px solid rgba(0,0,0,.05) !important;
      background: rgba(255,255,255,.78) !important;
      text-decoration:none !important;
      color: rgba(15,15,18,.92) !important;
      font-weight:720 !important;
    }
    .menu-link:hover{ background: rgba(15,15,18,.04) !important; }
  </style>

  <div class="shell top-row-inner">
    <a class="brand soft-hover" href="/">
      <div class="logo-badge" aria-hidden="true">
        <img class="logo-img" src="/assets/Logo.PNG?v=1" alt="PeerRate logo" />
      </div>
      <div>
        <div class="brand-name">PeerRate</div>
        <div class="brand-sub" data-i18n="top_sub">Förtroende du kan bevisa</div>
      </div>
    </a>

    <div class="top-actions">
      <!-- GUBBE -->
      <button class="top-user" id="topUserBtn" type="button" aria-label="Konto" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="user-menu" id="userMenu" role="menu" aria-label="Användarmeny"></div>

      <button class="lang-pill soft-hover" id="langBtn" type="button" aria-haspopup="true" aria-expanded="false">
        <span id="langLabel">SV</span>
        <span style="opacity:.6;">▾</span>
      </button>

      <button class="menu-btn soft-hover" id="menuBtn" type="button" aria-label="Öppna meny" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16" stroke="rgba(15,15,18,.85)" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="lang-menu" id="langMenu" role="menu" aria-label="Välj språk">
    <button type="button" data-lang="sv">Svenska (SV)</button>
    <button type="button" data-lang="en">English (EN)</button>
  </div>

  <nav class="menu-panel" id="menuPanel" aria-label="Meny">
    <div class="shell menu-panel-inner">
      <a class="menu-link" href="/"><div data-i18n="menu_home">Hem</div><span>→</span></a>
      <a class="menu-link" href="/customer.html"><div data-i18n="menu_signup">Registrera dig</div><span>→</span></a>
      <a class="menu-link" href="/profile.html"><div data-i18n="menu_profile">Min profil</div><span>→</span></a>
      <a class="menu-link" href="/rate.html"><div data-i18n="menu_rate">Lämna betyg</div><span>→</span></a>
      <a class="menu-link" href="/extension.html"><div data-i18n="menu_extension">Installera extension</div><span>→</span></a>
      <a class="menu-link" href="/references.html"><div data-i18n="menu_workrefs">Arbetsreferenser</div><span>→</span></a>
    </div>
  </nav>
</header>
