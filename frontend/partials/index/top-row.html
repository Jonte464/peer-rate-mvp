<!-- TOP ROW -->
<header class="top-row">
  <style>
    /* =========================
       TOP ROW OVERRIDES (globalt)
       Gör så att top-row blir enhetlig oavsett sidans egna CSS.
       ========================= */

    /* 1) Gubben ska alltid synas */
    .top-row .top-user{
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 40px !important;
      height: 40px !important;
      border-radius: 999px !important;
      border: 1px solid rgba(11,22,51,.16) !important;
      background: rgba(255,255,255,.78) !important;
      box-shadow: 0 10px 30px rgba(0,0,0,.10) !important;
      cursor: pointer !important;
      user-select: none !important;
      position: relative !important;
      color: rgba(11,22,51,.92) !important; /* mörkblå */
    }

    /* 2) Grön “inloggad”-dot (bara när JS sätter .is-logged-in) */
    .top-row .top-user.is-logged-in::after{
      content:"";
      position:absolute;
      width:10px; height:10px;
      border-radius:999px;
      right:-1px; top:-1px;
      background: rgba(34,197,94,1);
      box-shadow: 0 0 0 6px rgba(34,197,94,.12);
      border: 2px solid rgba(255,255,255,.92);
    }

    /* 3) Gubben: fin “mörkblå ikon” */
    .top-row .top-user svg path{
      stroke: rgba(11,22,51,.92) !important;
    }

    /* 4) Hamburger-menyn: mer luft runt panelen */
    .top-row .menu-panel{
      top: 68px !important;                 /* lite längre ner */
      right: 16px !important;
      width: 280px !important;
      padding: 10px !important;             /* luft mellan panel och innehåll */
      border-radius: 18px !important;
      background: rgba(255,255,255,.96) !important;
      border: 1px solid rgba(15,15,18,.10) !important;
      box-shadow: 0 24px 70px rgba(0,0,0,.16) !important;
    }

    .top-row .menu-panel-inner{
      padding: 10px !important;
      gap: 10px !important;
    }

    .top-row .menu-link{
      border-radius: 14px !important;
      padding: 12px 12px !important;
      background: rgba(255,255,255,.78) !important;
    }
  </style>

  <div class="shell top-row-inner">
    <a class="brand soft-hover" href="/">
      <div class="logo-badge" aria-hidden="true">
        <img class="logo-img" src="/assets/Logo.PNG?v=1" alt="PeerRate logo" />
      </div>
      <div>
        <div class="brand-name">PeerRate</div>
        <div class="brand-sub" data-i18n="top_sub">Förtroende du kan bevisa</div>
      </div>
    </a>

    <div class="top-actions">
      <!-- GUBBE -->
      <button class="top-user" id="topUserPill" type="button" aria-label="Konto" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0" stroke="rgba(11,22,51,.92)" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="rgba(11,22,51,.92)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <!-- User dropdown (innehåll fylls av topRowEnhance.js) -->
      <div class="user-menu" id="userMenu" role="menu" aria-label="Användarmeny"></div>

      <button class="lang-pill soft-hover" id="langBtn" type="button" aria-haspopup="true" aria-expanded="false">
        <span id="langLabel">SV</span>
        <span style="opacity:.6;">▾</span>
      </button>

      <button class="menu-btn soft-hover" id="menuBtn" type="button" aria-label="Öppna meny" aria-expanded="false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16" stroke="rgba(15,15,18,.85)" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="lang-menu" id="langMenu" role="menu" aria-label="Välj språk">
    <button type="button" data-lang="sv">Svenska (SV)</button>
    <button type="button" data-lang="en">English (EN)</button>
  </div>

  <nav class="menu-panel" id="menuPanel" aria-label="Meny">
    <div class="shell menu-panel-inner">
      <a class="menu-link" href="/"><div>Hem</div><span>→</span></a>
      <a class="menu-link" href="/customer.html"><div>Registrera dig</div><span>→</span></a>
      <a class="menu-link" href="/profile.html"><div>Min profil</div><span>→</span></a>
      <a class="menu-link" href="/rate.html"><div>Lämna betyg</div><span>→</span></a>
      <a class="menu-link" href="/extension.html"><div>Installera extension</div><span>→</span></a>
      <a class="menu-link" href="/references.html"><div>Arbetsreferenser</div><span>→</span></a>
    </div>
  </nav>
</header>
